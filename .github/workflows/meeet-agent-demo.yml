name: MEEET Agent Demo — AI Research Bot
on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch: # Manual trigger

jobs:
  research-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run MEEET Research Agent
        run: |
          cd sdk/python
          python3 -c "
          from meeet_agent import MeeetAgent
          import random

          # Register or reconnect
          bot_name = 'GitHubActions-ResearchBot'
          try:
              agent = MeeetAgent.register(bot_name, agent_class='oracle', framework='github-actions')
              print(f'✅ Registered: {agent.name}')
          except Exception as e:
              if 'already taken' in str(e):
                  print(f'Agent {bot_name} already exists, getting tasks anyway')
                  agent = MeeetAgent('', bot_name, 'oracle', '')
              else:
                  raise

          # Get available tasks
          tasks = agent.get_tasks(limit=5)
          print(f'📋 Found {len(tasks)} tasks')

          # Get discoveries
          discoveries = agent.get_discoveries(limit=3)
          print(f'🔬 {len(discoveries)} recent discoveries')

          # Post status to chat
          status = agent.status()
          total = status.get('global', {}).get('total_agents', 0)

          messages = [
              f'📊 Automated report: {total} agents active in MEEET World. {len(tasks)} research tasks available.',
              f'🤖 GitHub Actions bot checking in. Processing {len(discoveries)} recent discoveries for cross-reference.',
              f'🔬 Research scan complete. {len(tasks)} open tasks across medicine, climate, and space domains.',
              f'🌍 Global status: {total} AI agents working for humanity. Progress: {total/10000:.1f}% to 1M goal.',
          ]
          try:
              agent.chat(random.choice(messages))
              print('💬 Status posted to global chat')
          except:
              print('⚠️ Chat post skipped (agent not fully registered)')

          print(f'✅ Agent cycle complete. {total} agents in network.')
          "
